<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Registration Form</title>

<style>
body {
    font-family: Arial;
    background: #e6f0ff;
    margin: 0;
    padding: 20px;
}

/* A4 Container */
.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px 30px;
    border-radius: 10px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

/* Header */
.header {
    text-align: center;
    border-bottom: 2px solid #4facfe;
    padding-bottom: 10px;
    margin-bottom: 20px;
}

.header img {
    width: 70px;
}

.header h2 {
    margin: 5px 0;
}

/* Form Grid */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

label {
    font-weight: bold;
}

/* Inputs */
input, select {
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    margin-top: 5px;
    transition: 0.3s;
}

/* Focus effect */
input:focus, select:focus {
    border-color: #4facfe;
    box-shadow: 0 0 6px #4facfe;
}

/* Full width */
.full {
    grid-column: span 2;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px;
    background: #4facfe;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #007bff;
    transform: scale(1.05);
}

/* Image preview */
#preview {
    width: 100px;
    height: 100px;
    margin-top: 10px;
    border-radius: 8px;
    display: none;
    object-fit: cover;
}

/* Popup */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    text-align: center;
    opacity: 0;
    transition: 0.3s;
}

.popup.active {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

</style>

</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
        <h2>Government Polytechnic,Solapur College of Engineering</h2>
        <p>Student Exam Registration Form</p>
    </div>

    <form onsubmit="return submitForm(event)">

        <div class="form-grid">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label>Roll Number</label>
                <input type="text" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" required>
            </div>

            <div class="form-group">
                <label>Course</label>
                <select required>
                    <option>Select</option>
                    <option>Computer</option>
                    <option>Mechanical</option>
                    <option>Civil</option>
                </select>
            </div>

            <div class="form-group">
                <label>Exam Type</label>
                <select required>
                    <option>Select</option>
                    <option>Unit Test</option>
                    <option>Mid Term</option>
                    <option>Final</option>
                </select>
            </div>

            <div class="form-group full">
                <label>Upload Photo</label>
                <input type="file" accept="image/*" onchange="previewImage(event)">
                <img id="preview">
            </div>

        </div>

        <button type="submit">Submit Registration</button>

    </form>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <h3>✅ Registration Successful!</h3>
    <p>Your form has been submitted.</p>
    <button onclick="closePopup()">OK</button>
</div>

<script>
function previewImage(event) {
    let reader = new FileReader();
    reader.onload = function(){
        let output = document.getElementById('preview');
        output.src = reader.result;
        output.style.display = "block";
    }
    reader.readAsDataURL(event.target.files[0]);
}

function submitForm(e) {
    e.preventDefault();
    document.getElementById("popup").classList.add("active");
    return false;
}

function closePopup() {
    document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
